apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: provision-proxmox-vm
  namespace: argo-workflows
spec:
  serviceAccountName: gitops-workflow-sa
  entrypoint: create-vm-commit
  arguments:
    parameters:
      - name: repo-url
        value: "github.com/anomaly51/proxmox-vms-terraform.git"
      - name: vm-name
        value: "new-gitops-vm"
      - name: target-node
        value: "machine-1"
      - name: cores
        value: "4"
      - name: memory
        value: "4096"
      - name: disk-size
        value: "20"
      - name: template-name
        value: "debian-base"
  templates:
    - name: create-vm-commit
      inputs:
        parameters:
          - name: repo-url
          - name: vm-name
          - name: target-node
          - name: cores
          - name: memory
          - name: disk-size
          - name: template-name
      container:
        image: alpine/git:v2.43.0
        command: [sh, -c]
        args:
          - |
            set -e
            git config --global user.name "Argo Workflows"
            git config --global user.email "argo@devops.local"

            git clone https://${GIT_TOKEN_P1}${GIT_TOKEN_P2}@{{ "{{inputs.parameters.repo-url}}" }} /workspace
            cd /workspace

            mkdir -p envs/shared/{{ "{{inputs.parameters.vm-name}}" }}

            cat << 'EOF' > envs/shared/{{ "{{inputs.parameters.vm-name}}" }}/main.tf
            terraform {
              required_providers {
                proxmox = {
                  source  = "telmate/proxmox"
                  version = "3.0.2-rc07"
                }
              }
            }

            provider "proxmox" {
              pm_api_url          = "https://192.168.1.35:8006/api2/json"
              pm_api_token_id     = "terraform@pam!terraform"
              pm_api_token_secret = "bdcbd933-8cbf-4c6c-be85-41b0b8f74ba3"
              pm_tls_insecure     = true
            }

            module "vm" {
              source          = "git::https://github.com/anomaly51/proxmox-vms-terraform.git//modules/vm?ref=main"
              name            = "{{ "{{inputs.parameters.vm-name}}" }}"
              description     = "Provisioned via Argo Workflows"
              template_name   = "{{ "{{inputs.parameters.template-name}}" }}"
              target_node     = "{{ "{{inputs.parameters.target-node}}" }}"
              cores           = {{ "{{inputs.parameters.cores}}" }}
              memory          = {{ "{{inputs.parameters.memory}}" }}
              scsi0_disk_size = {{ "{{inputs.parameters.disk-size}}" }}
            }
            EOF

            git add envs/shared/{{ "{{inputs.parameters.vm-name}}" }}/main.tf
            git commit -m "feat: provision VM {{ "{{inputs.parameters.vm-name}}" }}"
            git push origin main
        env:
          - name: GIT_TOKEN_P1
            value: "ghp_"
          - name: GIT_TOKEN_P2
            value: "95do3C5ZrLwwvkIhLkyf4UERp8PFhW1yfyoM"
