apiVersion: repo-manager.pulpproject.org/v1
kind: Pulp
metadata:
  name: pulp
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  api:
    replicas: 1
  content:
    replicas: 1
  worker:
    replicas: 1
  web:
    replicas: 1
  database:
    postgres_storage_class: standard
  file_storage_access_mode: "ReadWriteOnce"
  file_storage_size: "5Gi"
  file_storage_storage_class: standard
